services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      - LUMINAR_NODE_COUNT=50
      - LUMINAR_LOG_LEVEL=INFO
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/sim/snapshot"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge
