name: luminar
region: nyc

services:
  - name: backend
    dockerfile_path: docker/Dockerfile.backend
    source_dir: /
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xs
    routes:
      - path: /
    envs:
      - key: LUMINAR_NODE_COUNT
        value: "50"
      - key: LUMINAR_LOG_LEVEL
        value: "INFO"
    health_check:
      http_path: /api/sim/snapshot
      initial_delay_seconds: 20
      period_seconds: 30
      failure_threshold: 3
