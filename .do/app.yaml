name: luminar
region: nyc

services:
  - name: backend
    dockerfile_path: docker/Dockerfile.backend
    source_dir: /
    http_port: 8080
    run_command: uv run uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8080}
    instance_count: 1
    instance_size_slug: basic-xs
    routes:
      - path: /api
      - path: /ws
      - path: /docs
      - path: /openapi.json
    envs:
      - key: LUMINAR_NODE_COUNT
        value: "50"
      - key: LUMINAR_LOG_LEVEL
        value: "INFO"
    health_check:
      http_path: /api/sim/snapshot
      initial_delay_seconds: 15
      period_seconds: 30
      failure_threshold: 3

static_sites:
  - name: frontend
    build_command: cd frontend && npm ci && npm run build
    output_dir: frontend/dist
    source_dir: /
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: "production"
